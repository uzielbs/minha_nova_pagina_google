<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Nova Guia Personalizada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-size: cover;
            background-position: center;
            color: #fff;
            min-height: 100vh;
        }
        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 80%;
            max-width: 600px;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .shortcuts {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .shortcut {
            text-align: center;
            width: 100px;
        }
        .shortcut img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .shortcut a {
            text-decoration: none;
            color: #fff;
            font-size: 14px;
            display: block;
            margin-top: 5px;
        }
        .background-settings {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .background-settings:hover {
            background: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body style="background-image: url('https://via.placeholder.com/1920x1080');">
    <!-- Campo de Pesquisa -->
    <div class="search-box">
        <form action="https://www.google.com/search" method="get" target="_blank">
            <input type="text" name="q" placeholder="Pesquisar no Google..." required>
        </form>
    </div>

    <!-- Atalhos Personalizados -->
    <div class="shortcuts">
        <div class="shortcut">
            <a href="https://www.google.com" target="_blank">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Google
            </a>
        </div>
        <div class="shortcut">
            <a href="https://www.youtube.com" target="_blank">
                <img src="https://www.youtube.com/favicon.ico" alt="YouTube">
                YouTube
            </a>
        </div>
        <div class="shortcut">
            <a href="https://www.wikipedia.org" target="_blank">
                <img src="https://www.wikipedia.org/static/favicon/wikipedia.ico" alt="Wikipedia">
                Wikipedia
            </a>
        </div>
        <!-- Adicione mais atalhos aqui -->
    </div>

    <!-- Botão para Alterar Background -->
    <div class="background-settings" onclick="changeBackground()">
        Alterar Fundo
    </div>

    <script>
        // Função para alterar o plano de fundo
        function changeBackground() {
            const backgrounds = [
                'https://via.placeholder.com/1920x1080/FF5733/FFFFFF',
                'https://via.placeholder.com/1920x1080/33FF57/FFFFFF',
                'https://via.placeholder.com/1920x1080/3357FF/FFFFFF',
                'https://via.placeholder.com/1920x1080/F3FF33/FFFFFF'
            ];
            const randomIndex = Math.floor(Math.random() * backgrounds.length);
            document.body.style.backgroundImage = `url('${backgrounds[randomIndex]}')`;
        }
    </script>
</body>
</html>
